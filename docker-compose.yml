x-api-common: &api-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  environment:
    DATABASE_URL: postgresql+asyncpg://unicef:unicef123@postgres:5432/unicef
    DATABASE_SYNC_URL: postgresql://unicef:unicef123@postgres:5432/unicef
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/2
    CELERY_RESULT_BACKEND: redis://redis:6379/3
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    MINIO_BUCKET_REPORTS: unicef-reports
    MINIO_BUCKET_MODELS: ml-models
    MINIO_SECURE: "false"
    PYTHONPATH: /app
    APP_ROOT: /app
  volumes:
    - .:/app
    - /app/__pycache__

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: unicef
      POSTGRES_PASSWORD: unicef123
      POSTGRES_DB: unicef
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      # pg_isready only checks the TCP socket — not that the DB engine
      # finished startup (WAL replay + PostGIS init can add several seconds).
      # We add a real SQL query so the healthcheck only passes when
      # the DB is genuinely accepting queries, not just listening on the port.
      test: ["CMD-SHELL", "pg_isready -U unicef -d unicef && psql -U unicef -d unicef -c 'SELECT 1' -q --no-align --tuples-only"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly yes
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/unicef-reports &&
        mc mb --ignore-existing local/ml-models &&
        echo 'MinIO buckets ready'
      "

  db-init:
    <<: *api-common
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    # Retry wrapper: asyncpg can still get "CannotConnectNowError" for a
    # brief window after the healthcheck passes (PostGIS finishing its init).
    # wait_and_init.py retries up to 5 times with 3-second backoff.
    command: python /docker-init/wait_and_init.py
    volumes:
      - .:/app
      - ./wait_and_init.py:/docker-init/wait_and_init.py:ro

  db-seed:
    # Uses seed_data.py (placed alongside docker-compose.yml) instead of
    # seed_regions.py which targets a different, incompatible DB schema.
    # The script is copied into the app directory so Python path resolution works.
    <<: *api-common
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: "no"
    command: >
      sh -c "cp /docker-seed/seed_data.py /app/scripts/seed_data.py &&
             python /app/scripts/seed_data.py"
    volumes:
      - .:/app
      - ./seed_data.py:/docker-seed/seed_data.py:ro

  api:
    <<: *api-common
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully
    command: >
      uvicorn src.api.main:create_application
      --factory
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir src
      --log-level info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  celery-worker:
    <<: *api-common
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully
    command: >
      celery -A src.data_collection.scheduler worker
      --loglevel=info
      --concurrency=2

  celery-beat:
    <<: *api-common
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully
    command: >
      celery -A src.data_collection.scheduler beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler

volumes:
  postgres_data:
  redis_data:
  minio_data:
